# Dependabot configuration:
# https://docs.github.com/en/free-pro-team@latest/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  # Maintain dependencies for Gradle dependencies
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      # Kotlin compiler plugins and Kover must move in lockstep: bumping either
      # Kotlin plugin alone breaks the build (see PRs #6/#9), and Kotlin bumps
      # need a Kover version compatible with the new KGP.
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
    ignore:
      # ktor >= 3.5.0 requires kotlinx-coroutines 1.11.0 (EmbeddedServer calls
      # runBlockingK, introduced in 1.11.0), but the plugin must run on the
      # IDE-bundled coroutines, and no IntelliJ Platform release ships 1.11 yet
      # (2025.1 test platform: 1.8.0-intellij; 2026.1 IDEs also lack it — see
      # PR superseding #49). Lift this once the platform's coroutines catch up.
      - dependency-name: "io.ktor:*"
        versions: [">= 3.5.0"]
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
